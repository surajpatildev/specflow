name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          fetch-tags: true

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag --sort=-v:refname --list 'v[0-9]*' | head -1)
          if [ -z "$LATEST" ]; then
            CURRENT="0.0.0"
          else
            CURRENT="${LATEST#v}"
          fi

          if ! [[ "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Latest tag '$LATEST' is not valid semver"
            exit 1
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT -> $NEXT (${{ inputs.bump }})"

      - name: Ensure tag does not exist
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists"
            exit 1
          fi

      - name: Update version in plugin manifests
        run: |
          V="${{ steps.version.outputs.next }}"
          updated=$(jq --arg v "$V" '.version = $v' .claude-plugin/plugin.json) && echo "$updated" > .claude-plugin/plugin.json
          updated=$(jq --arg v "$V" '.plugins[0].version = $v' .claude-plugin/marketplace.json) && echo "$updated" > .claude-plugin/marketplace.json

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.next }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c062e08bd532815e2082a07e5e6fad17a04daafc # v2.2.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## Install

            ```
            /plugin marketplace add surajpatildev/specflow
            /plugin install specflow@specflow
            ```
          generate_release_notes: true

      - name: Cleanup tag on release failure
        if: failure()
        run: git push --delete origin "${{ steps.version.outputs.tag }}" || true
